kind = "web"
previewPath = "/"
title = "AI Telegram Assistant"
version = "1.0.0"
id = "artifacts/assistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19656

[services.development]
run = "pnpm --filter @workspace/assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assistant", "run", "build" ]
publicDir = "artifacts/assistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19656"
BASE_PATH = "/"
